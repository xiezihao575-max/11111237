<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全平台智能铺货 · 社交广告系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#f5f7fa;color:#222}
.header{width:100%;height:60px;background:#165dff;color:white;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:fixed;top:0;left:0;z-index:99}
.logo{font-weight:600;font-size:16px}
.wrap{display:flex;margin-top:60px}
.sidebar{width:220px;background:#fff;height:calc(100vh - 60px);position:fixed;border-right:1px solid #e4e7ed;padding-top:10px}
.menu-item{padding:12px 15px;border-radius:8px;cursor:pointer;margin-bottom:4px}
.menu-item.active{background:#e8f3ff;color:#165dff;font-weight:500}
.content{margin-left:220px;padding:20px;flex:1}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card-title{font-size:16px;font-weight:600;margin-bottom:15px}
input,textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-top:10px}
textarea{resize:vertical}
.lang-group{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.lang{padding:8px 12px;border:1px solid #ddd;border-radius:8px;cursor:pointer}
.lang.active{background:#e8f3ff;color:#165dff;border-color:#165dff}
.upload{border:2px dashed #ddd;padding:25px;text-align:center;border-radius:8px;margin-top:10px;cursor:pointer}
.btn{background:#165dff;color:white;padding:14px;border-radius:8px;text-align:center;font-weight:500;margin-top:20px;cursor:pointer}
.btn-success{background:#00b96b}
.result{background:#f7f8fa;padding:15px;border-radius:8px;margin-top:15px;white-space:pre-wrap;font-size:14px}
.platform-item{border:1px solid #eee;border-radius:10px;padding:15px;margin-bottom:10px}
.platform-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.platform-name{font-weight:500;font-size:15px}
.switch{width:40px;height:22px;background:#ccc;border-radius:11px;position:relative;cursor:pointer}
.switch::after{content:'';width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:.2s}
.switch.on{background:#165dff}
.switch.on::after{left:20px}
.config-form{display:flex;gap:10px;margin-top:10px}
.config-form input{flex:1;margin-top:0}
.analysis-card{border-left:4px solid #165dff;background:#f8f9ff;padding:12px;border-radius:8px;margin-top:10px}
</style>
</head>
<body>

<div class="header">
  <div class="logo">全平台智能铺货 · 社交广告系统</div>
</div>

<div class="wrap">
  <div class="sidebar">
    <div class="menu-item active" onclick="show('publish')">📦 商品发布</div>
    <div class="menu-item" onclick="show('platforms')">⚙️ 平台管理</div>
    <div class="menu-item" onclick="show('social')">📱 社交分析</div>
    <div class="menu-item" onclick="show('ads')">📢 广告投放</div>
    <div class="menu-item" onclick="show('list')">📋 发布记录</div>
  </div>

  <div class="content">

    <!-- 商品发布 -->
    <div id="publish" class="page" style="display:block">
      <div class="card">
        <div class="card-title">📝 商品信息（仅填中文）</div>
        <input id="title" placeholder="商品标题">
        <textarea id="desc" rows="4" placeholder="商品描述"></textarea>
      </div>

      <div class="card">
        <div class="card-title">🌐 翻译语言（点击开关）</div>
        <div class="lang-group">
          <div class="lang" data-lang="en">英语</div>
          <div class="lang" data-lang="vi">越南语</div>
          <div class="lang" data-lang="th">泰语</div>
          <div class="lang" data-lang="ms">马来语</div>
          <div class="lang" data-lang="id">印尼语</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">🖼️ 上传图片/视频</div>
        <div class="upload" onclick="document.getElementById('file').click()">选择文件</div>
        <input type="file" id="file" multiple accept="image/*,video/*" style="display:none">
      </div>

      <div class="btn btn-success" onclick="publish()">🚀 一键翻译 + 发布到已开启平台</div>
      <div class="result" id="result"></div>
    </div>

    <!-- 平台管理 -->
    <div id="platforms" class="page" style="display:none">
      <div class="card">
        <div class="card-title">⚙️ 平台管理（开关+账号配置）</div>

        <div class="platform-item">
          <div class="platform-row"><div class="platform-name">Shopee</div><div class="switch on" data-p="shopee"></div></div>
          <div class="config-form"><input placeholder="店铺ID/账号" class="shopee_account"><input placeholder="密码/Token" type="password" class="shopee_pwd"></div>
        </div>
        <div class="platform-item">
          <div class="platform-row"><div class="platform-name">TikTok Shop</div><div class="switch on" data-p="tiktok"></div></div>
          <div class="config-form"><input placeholder="店铺ID" class="tiktok_account"><input placeholder="Token" type="password" class="tiktok_pwd"></div>
        </div>
        <div class="platform-item">
          <div class="platform-row"><div class="platform-name">Facebook</div><div class="switch on" data-p="facebook"></div></div>
          <div class="config-form"><input placeholder="Page ID/账号" class="fb_account"><input placeholder="Token" type="password" class="fb_pwd"></div>
        </div>
        <div class="platform-item">
          <div class="platform-row"><div class="platform-name">Instagram</div><div class="switch on" data-p="instagram"></div></div>
          <div class="config-form"><input placeholder="账号" class="ig_account"><input placeholder="密码" type="password" class="ig_pwd"></div>
        </div>
        <div class="platform-item">
          <div class="platform-row"><div class="platform-name">Lazada</div><div class="switch off" data-p="lazada"></div></div>
          <div class="config-form"><input placeholder="店铺账号" class="lazada_account"><input placeholder="密码" type="password" class="lazada_pwd"></div>
        </div>
        <div class="platform-item">
          <div class="platform-row"><div class="platform-name">抖音</div><div class="switch off" data-p="douyin"></div></div>
          <div class="config-form"><input placeholder="抖音号" class="dy_account"><input placeholder="密码" type="password" class="dy_pwd"></div>
        </div>

        <div class="btn" onclick="savePlatformConfig()">💾 保存全部配置</div>
      </div>
    </div>

    <!-- 社交平台分析 -->
    <div id="social" class="page" style="display:none">
      <div class="card">
        <div class="card-title">📱 社交平台AI分析</div>
        <input id="social_product" placeholder="输入你的产品名称">
        <button class="btn" onclick="aiSocialAnalysis()">🔍 AI分析社交平台适合度</button>
        <div id="social_result" class="result"></div>
      </div>
    </div>

    <!-- 广告投放 -->
    <div id="ads" class="page" style="display:none">
      <div class="card">
        <div class="card-title">📢 全平台广告投放方向</div>
        <input id="ads_product" placeholder="输入你的产品名称">
        <button class="btn" onclick="aiAdsSuggest()">📊 AI生成广告投放方案</button>
        <div id="ads_result" class="result"></div>
      </div>
    </div>

    <!-- 发布记录 -->
    <div id="list" class="page" style="display:none">
      <div class="card"><div class="card-title">📋 发布历史</div><p style="margin-top:10px">暂无记录</p ></div>
    </div>

  </div>
</div>

<script>
// 页面切换
function show(id) {
  document.querySelectorAll('.page').forEach(p=>p.style.display='none')
  document.getElementById(id).style.display='block'
  document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'))
  event.target.classList.add('active')
}

// 语言开关
document.querySelectorAll('.lang').forEach(i=>{
  i.onclick = () => i.classList.toggle('active')
})

// 平台开关
document.querySelectorAll('.switch').forEach(s=>{
  s.onclick = () => s.classList.toggle('on')
})

// 获取已开启平台
function getEnabled() {
  const arr = []
  document.querySelectorAll('.switch.on').forEach(s=>{
    arr.push(s.dataset.p)
  })
  return arr
}

// 保存配置
function savePlatformConfig() {
  const config = {
    shopee: { account: document.querySelector('.shopee_account').value, pwd: document.querySelector('.shopee_pwd').value },
    tiktok: { account: document.querySelector('.tiktok_account').value, pwd: document.querySelector('.tiktok_pwd').value },
    facebook: { account: document.querySelector('.fb_account').value, pwd: document.querySelector('.fb_pwd').value },
    instagram: { account: document.querySelector('.ig_account').value, pwd: document.querySelector('.ig_pwd').value }
  }
  localStorage.setItem('platform_config', JSON.stringify(config))
  alert('✅ 平台配置已保存')
}

// 一键发布
function publish() {
  const title = document.getElementById('title').value
  const desc = document.getElementById('desc').value
  const res = document.getElementById('result')
  const platforms = getEnabled()

  if(!title||!desc){alert('请填写标题和描述');return}
  if(platforms.length===0){alert('请先在平台管理开启至少一个平台');return}

  res.innerText = "✅ 读取平台配置成功\n"
  res.innerText += "📤 已开启平台："+platforms.join(' | ')+"\n\n"
  res.innerText += "🌐 多语言翻译中：\n"

  document.querySelectorAll('.lang.active').forEach(l=>{
    res.innerText += "✅ "+l.dataset.lang+" 完成\n"
  })

  res.innerText += "\n🚀 发布成功！\n"
  res.innerText += "已同步至："+platforms.join(' | ')
}

// 社交平台AI分析
function aiSocialAnalysis() {
  const p = document.getElementById('social_product').value
  if(!p){alert('请输入产品');return}
  const r = document.getElementById('social_result')
  r.innerText = `📱 【${p}】社交平台AI分析\n\n`
  r.innerText += "Facebook：适合B2C、高转化、粉丝页运营\n"
  r.innerText += "Instagram：视觉产品、高质量图片/短视频\n"
  r.innerText += "LinkedIn：B2B、工厂、批发、机械、设备\n"
  r.innerText += "TikTok：爆款短视频、直播带货、趋势玩法\n"
  r.innerText += "\n🎯 建议：以短视频+图片双形式布局全平台"
}

// 广告投放建议
function aiAdsSuggest() {
  const p = document.getElementById('ads_product').value
  if(!p){alert('请输入产品');return}
  const r = document.getElementById('ads_result')
  r.innerText = `📢 【${p}】全平台广告投放方案\n\n`
  r.innerText += "Facebook/IG：兴趣投放 | 图片+视频 | 中等出价\n"
  r.innerText += "TikTok：兴趣+行为 | 短视频素材 | 低起量\n"
  r.innerText += "Google：关键词搜索 | 高意向 | 高出价\n"
  r.innerText += "LinkedIn：公司定位 | B2B行业 | 精准投放\n"
  r.innerText += "阿里国际：产品词+长尾词 | 高转化\n"
  r.innerText += "\n💰 预算建议：每日50-300美元，按平台分比例投放"
}
</script>
</body>
</html>
