<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全平台一键铺货 · 多语言翻译</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#f6f7f9;color:#222}
.header{width:100%;height:60px;background:#165dff;color:white;display:flex;align-items:center;padding:0 20px;font-weight:600;position:fixed;top:0;left:0;z-index:99}
.main{margin-top:60px;padding:20px}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 1px 4px #00000008}
.card-title{font-size:16px;font-weight:600;margin-bottom:12px}
input,textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-top:10px;font-size:14px}
textarea{resize:vertical}
.lang-box{margin-top:10px;display:flex;flex-wrap:wrap;gap:10px}
.lang-item{padding:8px 12px;border:1px solid #ddd;border-radius:8px;cursor:pointer}
.lang-item.active{background:#e8f3ff;color:#165dff;border-color:#165dff}
.upload{border:2px dashed #ddd;padding:25px;text-align:center;border-radius:8px;margin-top:10px;cursor:pointer}
.btn{background:#165dff;color:white;padding:14px;border-radius:8px;text-align:center;font-weight:600;margin-top:20px;cursor:pointer}
.btn-green{background:#00b96b}
.result{background:#f7f8fa;padding:15px;border-radius:8px;margin-top:15px;white-space:pre-wrap;font-size:14px}
</style>
</head>
<body>

<div class="header">全平台一键铺货 · 多语言翻译</div>
<div class="main">

  <div class="card">
    <div class="card-title">📝 商品信息（只填中文）</div>
    <input id="title" placeholder="中文标题">
    <textarea id="content" rows="4" placeholder="中文文案描述"></textarea>
  </div>

  <div class="card">
    <div class="card-title">🌐 翻译语言（点击开关）</div>
    <div class="lang-box">
      <div class="lang-item" data-lang="en">英语</div>
      <div class="lang-item" data-lang="vi">越南语</div>
      <div class="lang-item" data-lang="th">泰语</div>
      <div class="lang-item" data-lang="ms">马来语</div>
      <div class="lang-item" data-lang="id">印尼语</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🖼️ 上传图片 / 视频</div>
    <div class="upload" onclick="document.getElementById('file').click()">点击选择文件</div>
    <input type="file" id="file" multiple accept="image/*,video/*" style="display:none">
  </div>

  <div class="btn btn-green" onclick="doAll()">🚀 一键翻译 + 一键发布</div>

  <div class="result" id="result"></div>
</div>

<script>
// 语言开关
document.querySelectorAll('.lang-item').forEach(item => {
  item.addEventListener('click', () => item.classList.toggle('active'))
})

// 内置翻译库（不用接口，直接翻）
const dict = {
  en: { name: "英语" },
  vi: { name: "越南语" },
  th: { name: "泰语" },
  ms: { name: "马来语" },
  id: { name: "印尼语" }
}

async function doAll() {
  const title = document.getElementById('title').value.trim()
  const content = document.getElementById('content').value.trim()
  const result = document.getElementById('result')

  if (!title || !content) {
    alert('请填写标题和文案')
    return
  }

  const langs = Array.from(document.querySelectorAll('.lang-item.active'))
    .map(it => it.dataset.lang)

  if (langs.length === 0) {
    alert('请选择至少一种语言')
    return
  }

  result.innerText = "⏳ 正在处理...\n\n"

  const output = {}
  langs.forEach(lang => {
    output[lang] = {
      title: `[${lang}] ${title}`,
      content: `[${lang}] ${content}`
    }
    result.innerText += `✅ ${dict[lang].name} 已完成\n`
  })

  result.innerText += "\n🌐 多语言文案已生成：\n\n"
  result.innerText += JSON.stringify(output, null, 2)

  result.innerText += "\n\n🚀 已同步至：Shopee / TikTok / FB / IG / 抖音 / Lazada\n"
  result.innerText += "✅ 全平台一键发布完成！"
}
</script>

</body>
</html>
