<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>GLO ERP | 极简 HTML 直连版</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f9; padding: 40px; color: #333; }
        .box { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        input { width: 70%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { padding: 12px 24px; background: #0071e3; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #005bbd; }
        #log { margin-top: 20px; background: #1d1d1f; color: #00ffd0; padding: 15px; border-radius: 10px; font-family: monospace; height: 200px; overflow-y: auto; font-size: 13px; }
        .status { font-size: 12px; margin-bottom: 10px; color: #666; }
    </style>
</head>
<body>

<div class="box">
    <h2>🛰️ GLO ERP 选品引擎</h2>
    <p class="status">节点状态: <span id="api_status">正在检测本地 Llama 3...</span></p>
    
    <div style="display: flex; gap: 10px;">
        <input type="text" id="userInput" placeholder="输入产品关键词 (例如: 智能手表)">
        <button id="sendBtn">AI 深度分析</button>
    </div>

    <div id="log">>>> 系统就绪。请确保 Ollama 已启动并允许跨域。</div>
</div>

<script>
    const logBox = document.getElementById('log');
    const statusText = document.getElementById('api_status');

    function addLog(msg, isError = false) {
        const time = new Date().toLocaleTimeString();
        logBox.innerHTML += `<div style="color: ${isError ? '#ff3b30' : '#00ffd0'}">[${time}] ${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    // 1. 检查本地 AI 状态
    async function checkStatus() {
        try {
            const res = await fetch('http://localhost:11434/api/tags');
            if (res.ok) {
                statusText.innerText = "● 本地 AI 已连接";
                statusText.style.color = "#34c759";
            }
        } catch (e) {
            statusText.innerText = "○ 未连接 (请设置 OLLAMA_ORIGINS)";
            statusText.style.color = "#ff3b30";
        }
    }

    // 2. 调用 AI 分析
    document.getElementById('sendBtn').onclick = async () => {
        const text = document.getElementById('userInput').value;
        if (!text) return;

        addLog(`分析请求: ${text}...`);
        
        try {
            const response = await fetch('http://localhost:11434/api/generate', {
                method: 'POST',
                body: JSON.stringify({
                    model: 'llama3',
                    prompt: `作为选品专家，分析${text}的外贸潜力，50字以内。`,
                    stream: false
                })
            });

            const data = await response.json();
            addLog(`AI 建议: ${data.response}`);
        } catch (error) {
            addLog(`错误: 无法访问本地 API。请检查是否开启了跨域权限或 Ollama 是否运行。`, true);
        }
    };

    checkStatus();
</script>

</body>
</html>
